name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  test-and-autofix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Autofix simple style issues
        run: |
          ruff check . --fix
          ruff format .

      - name: Commit autofix changes (PR branches only)
        if: github.event_name == 'pull_request'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: apply automatic lint fixes"

      - name: Verify lint and format
        run: |
          ruff check .
          ruff format --check .

      - name: Run tests
        run: python -m pytest -q
