name: Deploy
run-name: Deploy merged PR #${{ github.event.pull_request.number }} to Pi

on:
  pull_request:
    types: [closed]
    branches: [ main ]

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Pi
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USER }}
          key: ${{ secrets.PI_SSH_KEY }}
          script: |
            set -e
            cd /home/pi/Home-monitor

            echo "=== DEPLOY START ==="
            date
            echo "PR #${{ github.event.pull_request.number }} merged into main"
            echo "Merge commit: ${{ github.event.pull_request.merge_commit_sha }}"
            echo "PR title: ${{ github.event.pull_request.title }}"

            echo "=== CURRENT DIRECTORY ==="
            pwd

            echo "=== CURRENT BRANCH ==="
            git branch --show-current

            echo "=== REMOTES ==="
            git remote -v

            echo "=== STATUS BEFORE PULL ==="
            git status --short

            echo "=== PULLING LATEST CODE ==="
            git pull origin main

            echo "=== LATEST COMMITS AFTER PULL ==="
            git log --oneline -5

            echo "=== PYTHON VERSION ==="
            python3 --version || true

            echo "=== INSTALLING DEPENDENCIES ==="
            source venv/bin/activate || true
            pip install -r requirements.txt || true

            echo "=== RESTARTING SERVICE ==="
            sudo systemctl restart home-monitor

            echo "=== SERVICE STATUS ==="
            sudo systemctl status home-monitor --no-pager

            echo "=== RECENT SERVICE LOGS ==="
            journalctl -u home-monitor -n 20 --no-pager || true

            echo "=== HEALTH CHECK ==="
            curl -fsS http://127.0.0.1:8000/health || true

            echo
            echo "=== DEPLOY DONE ==="
