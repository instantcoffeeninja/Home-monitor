name: Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    types: [closed]
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-home-monitor
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true) || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Pi
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USER }}
          key: ${{ secrets.PI_SSH_KEY }}
          script: |
            set -e
            cd /home/pi/Home-monitor

            echo "=== DEPLOY START ==="
            date
            echo "Event: ${{ github.event_name }}"

            echo "=== CURRENT DIRECTORY ==="
            pwd

            echo "=== CURRENT BRANCH ==="
            git branch --show-current

            echo "=== REMOTES ==="
            git remote -v

            echo "=== STATUS BEFORE PULL ==="
            git status --short

            echo "=== PULLING LATEST CODE ==="
            git pull origin main

            echo "=== LATEST COMMITS AFTER PULL ==="
            git log --oneline -5

            echo "=== PYTHON VERSION ==="
            python3 --version || true

            echo "=== INSTALLING DEPENDENCIES ==="
            source venv/bin/activate || true
            pip install -r requirements.txt || true

            echo "=== RESTARTING SERVICE ==="
            sudo systemctl restart home-monitor

            echo "=== SERVICE STATUS ==="
            sudo systemctl status home-monitor --no-pager

            echo "=== RECENT SERVICE LOGS ==="
            journalctl -u home-monitor -n 20 --no-pager || true

            echo "=== HEALTH CHECK ==="
            curl -fsS http://127.0.0.1:8000/health || true

            echo
            echo "=== DEPLOY DONE ==="
