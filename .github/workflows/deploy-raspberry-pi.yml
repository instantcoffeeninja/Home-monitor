name: Deploy to Raspberry Pi

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-home-monitor
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 10
    env:
      PI_APP_PATH: /home/pi/Home-monitor
      PI_SERVICE_NAME: home-monitor.service
      PI_APP_PORT: 5000
    steps:
      - name: Validate self-hosted runner environment
        run: |
          set -euo pipefail
          [ -d "$PI_APP_PATH" ] || { echo "Missing app path: $PI_APP_PATH" >&2; exit 1; }
          command -v git >/dev/null
          command -v python3 >/dev/null
          command -v curl >/dev/null
          command -v sudo >/dev/null

      - name: Deploy locally on Raspberry Pi
        run: |
          set -euo pipefail
          cd "$PI_APP_PATH"

          echo "=== DEPLOY START ==="
          date
          echo "Event: ${{ github.event_name }}"
          echo "Runner: $RUNNER_NAME"

          echo "=== CURRENT DIRECTORY ==="
          pwd

          echo "=== CURRENT BRANCH ==="
          git branch --show-current

          echo "=== REMOTES ==="
          git remote -v

          echo "=== STATUS BEFORE PULL ==="
          git status --short

          echo "=== PULLING LATEST CODE ==="
          git fetch --all
          git checkout main
          git pull --ff-only origin main

          echo "=== LATEST COMMITS AFTER PULL ==="
          git log --oneline -5

          echo "=== PYTHON VERSION ==="
          python3 --version

          echo "=== INSTALLING DEPENDENCIES ==="
          if [ -d venv ]; then
            . venv/bin/activate
            python -m pip install -r requirements.txt
          else
            python3 -m pip install -r requirements.txt
          fi

          echo "=== RESTARTING SERVICE ==="
          sudo systemctl restart "$PI_SERVICE_NAME"

          echo "=== SERVICE ACTIVE CHECK ==="
          sudo systemctl is-active --quiet "$PI_SERVICE_NAME"

          echo "=== SERVICE STATUS ==="
          sudo systemctl status "$PI_SERVICE_NAME" --no-pager

          echo "=== RECENT SERVICE LOGS ==="
          sudo journalctl -u "$PI_SERVICE_NAME" -n 40 --no-pager

          echo "=== LOCAL HEALTH CHECK ==="
          curl --silent --show-error --fail --max-time 5 "http://127.0.0.1:${PI_APP_PORT}/health"

          echo
          echo "=== DEPLOY DONE ==="

      - name: Install Playwright Chromium
        run: npx --yes playwright@1.54.2 install chromium

      - name: Capture local deployed page screenshot
        run: |
          set -euo pipefail
          npx --yes playwright@1.54.2 screenshot \
            --wait-for-timeout=10000 \
            "http://127.0.0.1:${PI_APP_PORT}/" \
            deploy-screenshot.png

      - name: Upload deployment screenshot artifact
        uses: actions/upload-artifact@v7
        with:
          name: deployed-page-screenshot
          path: deploy-screenshot.png
          if-no-files-found: error
